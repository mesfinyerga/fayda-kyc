version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
    expose:
      - "8000"

  frontend:
    build: ./frontend
    command: npm run build && npx serve -s dist -l 80
    working_dir: /app
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.25
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/staticfiles:/static
      - ./backend/media:/media
    ports:
      - "80:80"

volumes:
  postgres_data: 